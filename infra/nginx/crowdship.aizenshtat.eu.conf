server {
    listen 80;
    listen [::]:80;
    server_name crowdship.aizenshtat.eu;

    root /var/www/crowdship.aizenshtat.eu/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
