<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crowdship Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eff3ef;
        --text: #10211c;
        --muted: #52625b;
        --frame: #0a120e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font: 400 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        padding: 18px;
      }

      .page {
        max-width: 1280px;
        margin: 0 auto;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1;
      }

      .video-shell {
        aspect-ratio: 16 / 9;
        width: 100%;
        background: var(--frame);
        border-radius: 8px;
        overflow: hidden;
      }

      video {
        display: block;
        width: 100%;
        height: 100%;
        background: var(--frame);
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 320px;
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }

      .meta {
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 820px) {
        body {
          padding: 12px;
        }

        h1 {
          margin-bottom: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <p class="eyebrow">Crowdship</p>
      <h1>Hackathon demo</h1>

      <div class="video-shell">
        <div class="empty-state" id="empty-state">
          <div>
            <strong>Demo video unavailable.</strong>
            <p>Check back in a moment.</p>
          </div>
        </div>
        <video id="video-player" controls playsinline class="hidden"></video>
      </div>

      <p class="meta hidden" id="meta"></p>
    </main>

    <script>
      const videoPlayer = document.getElementById('video-player');
      const emptyState = document.getElementById('empty-state');
      const meta = document.getElementById('meta');
      const apiBase = new URLSearchParams(window.location.search).get('apiBase') || '';

      function formatBytes(sizeBytes) {
        if (!Number.isFinite(sizeBytes) || sizeBytes <= 0) {
          return '';
        }

        const units = ['bytes', 'KB', 'MB', 'GB'];
        let value = sizeBytes;
        let index = 0;

        while (value >= 1024 && index < units.length - 1) {
          value /= 1024;
          index += 1;
        }

        return `${value.toFixed(index === 0 ? 0 : 1)} ${units[index]}`;
      }

      async function loadState() {
        const response = await fetch(`${apiBase}/api/v1/demo-video`, {
          cache: 'no-store',
          credentials: 'omit',
        });

        if (!response.ok) {
          throw new Error(`State request failed with ${response.status}`);
        }

        const state = await response.json();
        if (!state || !state.hasVideo) {
          return;
        }

        videoPlayer.src = `${state.videoPath}?t=${encodeURIComponent(state.video.uploadedAt)}`;
        videoPlayer.classList.remove('hidden');
        emptyState.classList.add('hidden');

        if (state.video) {
          const uploadedAt = state.video.uploadedAt ? new Date(state.video.uploadedAt).toLocaleString() : '';
          const size = formatBytes(state.video.sizeBytes);
          meta.textContent = [state.video.filename, size, uploadedAt].filter(Boolean).join(' · ');
          meta.classList.remove('hidden');
        }
      }

      loadState().catch(() => {
        emptyState.classList.remove('hidden');
        videoPlayer.classList.add('hidden');
      });
    </script>
  </body>
</html>
