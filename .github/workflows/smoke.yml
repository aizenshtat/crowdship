name: Smoke

on:
  push:
  pull_request:

jobs:
  static-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate placeholder files
        run: |
          test -f public/index.html
          test -f public/health.txt
          test -f infra/nginx/crowdship.aizenshtat.eu.conf
          grep -q "crowdship.aizenshtat.eu" README.md
          grep -q "Product implementation has not started yet" README.md
          grep -q "No Simulation Rule" docs/preview-cicd.md
          grep -q "spec_pending_approval" docs/contribution-lifecycle.md
          grep -q "Implementation Worker" docs/architecture.md
